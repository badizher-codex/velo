# ── Documentation ─────────────────────────────────────────────────────────────

ReleaseNotes: |-
  Version 2.0.0 — Fase 2

  New features:
  - Shield Score (visual security badge in URL bar)
  - VELO Security Inspector (standalone analysis window, Ctrl+Shift+V)
  - NewTab v2 with top-sites mosaic and lifetime privacy stats
  - Command Bar (Ctrl+K) with fuzzy-search
  - Glance link preview (hover 600ms to preview)
  - Vertical tabs sidebar with Workspaces, Split View, and tab tear-off
  - VeloAgent chat panel with local AI (Ollama / LLamaSharp)
  - Portable mode (run from USB / no install)
  - Auto-updater (background check, user confirmation required)
  - Chocolatey and Winget packages

