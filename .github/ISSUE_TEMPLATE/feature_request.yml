name: 💡 Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome! Please check the [roadmap](docs/Phase2/VELO_FASE2_v3_DOCUMENTACION.md) first.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I'm frustrated when... / It would be great if..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Privacy / Security
        - VeloAgent (AI assistant)
        - UI / UX
        - Performance
        - Packaging / Installation
        - Localization
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: This feature aligns with VELO's privacy-first principle (no data leaves the device)
          required: false
