name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore VELO.sln

      - name: Publish (self-contained, win-x64)
        run: >
          dotnet publish src/VELO.App/VELO.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          --output publish/VELO

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Update version in installer script
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content installer/velo-setup.iss) -replace '#define AppVersion\s+"[^"]+"', "#define AppVersion   `"$tag`"" |
            Set-Content installer/velo-setup.iss

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\velo-setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Zip portable artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path publish/VELO/* -DestinationPath "VELO-$tag-win-x64-portable.zip"

      - name: Rename installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Rename-Item "publish/installer/VELO-v$version-Setup.exe" "VELO-$tag-Setup.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VELO ${{ github.ref_name }}"
          body: |
            ## VELO ${{ github.ref_name }}

            ### Descargas

            | Archivo | Descripción |
            |---|---|
            | `VELO-${{ github.ref_name }}-Setup.exe` | **Instalador recomendado** — instala en Archivos de programa, acceso directo en escritorio |
            | `VELO-${{ github.ref_name }}-win-x64-portable.zip` | Versión portable — extrae y ejecuta `VELO.exe` directamente |

            ### Requisitos
            - Windows 10 (1803+) o Windows 11 — **solo x64**
            - [Microsoft Edge WebView2 Runtime](https://developer.microsoft.com/microsoft-edge/webview2/) *(ya incluido en Windows 11 y la mayoría de Windows 10 actualizados)*

            ### Instalación rápida (portable)
            ```powershell
            Expand-Archive VELO-${{ github.ref_name }}-win-x64-portable.zip -DestinationPath "$env:LOCALAPPDATA\VELO"
            Start-Process "$env:LOCALAPPDATA\VELO\VELO.exe"
            ```

            ---
            > VELO es software libre bajo la licencia [GNU AGPLv3](https://github.com/${{ github.repository }}/blob/main/LICENSE).
          files: |
            VELO-${{ github.ref_name }}-Setup.exe
            VELO-${{ github.ref_name }}-win-x64-portable.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
