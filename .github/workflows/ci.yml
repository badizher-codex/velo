name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore VELO.sln -p:Platform=x64

      - name: Build
        run: dotnet build VELO.sln --configuration Release -p:Platform=x64 --no-restore -v quiet

      - name: Test — VELO.Security.Tests
        run: >
          dotnet test tests/VELO.Security.Tests/VELO.Security.Tests.csproj
          --configuration Release
          -p:Platform=x64
          --no-build
          --logger "trx;LogFileName=security.trx"
          --logger "console;verbosity=detailed"
          --results-directory TestResults

      - name: Test — VELO.Agent.Tests
        run: >
          dotnet test tests/VELO.Agent.Tests/VELO.Agent.Tests.csproj
          --configuration Release
          -p:Platform=x64
          --no-build
          --logger "trx;LogFileName=agent.trx"
          --logger "console;verbosity=detailed"
          --results-directory TestResults

      - name: Test — VELO.Core.Tests
        run: >
          dotnet test tests/VELO.Core.Tests/VELO.Core.Tests.csproj
          --configuration Release
          -p:Platform=x64
          --no-build
          --logger "trx;LogFileName=core.trx"
          --logger "console;verbosity=detailed"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
          retention-days: 14
