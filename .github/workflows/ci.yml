name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore VELO.sln -p:Platform=x64

      - name: Build
        run: dotnet build VELO.sln --configuration Release -p:Platform=x64 --no-restore -v quiet

      - name: Test
        run: >
          dotnet test VELO.sln
          --configuration Release
          -p:Platform=x64
          --logger "trx;LogFileName=test-results.trx"
          --logger "console;verbosity=detailed"
          --results-directory TestResults

      - name: Dump test results (debug)
        if: always()
        shell: pwsh
        run: |
          $trx = Get-ChildItem TestResults -Filter *.trx -Recurse -ErrorAction SilentlyContinue
          foreach ($f in $trx) { Write-Host "=== $($f.FullName) ==="; Get-Content $f.FullName }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
          retention-days: 14
